name: Release Extensions

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Verify Firefox manifest background fallback
        run: |
          npm run manifest:firefox
          node -e "const m=require('./manifest.json'); if (!Array.isArray(m.background?.scripts) || m.background.scripts.length === 0) { throw new Error('Firefox manifest missing background.scripts fallback') }"

      - name: Build browser packages
        run: |
          npm run package:chrome
          npm run package:firefox
          npm run package:edge
          npm run package:src

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            web-ext-artifacts/stutter-chrome-*.zip
            web-ext-artifacts/stutter-firefox-*.zip
            web-ext-artifacts/stutter-edge-*.zip
            web-ext-artifacts/*-src.zip
